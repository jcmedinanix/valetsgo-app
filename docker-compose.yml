version: '3.8'

services:
  valetsgo-app:
    image: jcmedinanix/valetsgo-app:latest
    container_name: valetsgo-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - APP_VERSION=1.0.0

  nginx:
    image: nginx:alpine
    container_name: valetsgo-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - valetsgo-app

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: valetsgo-uptime
    restart: always
    ports:
      - "3001:3001"
    volumes:
      - uptime-kuma-data:/app/data

volumes:
  uptime-kuma-data:
