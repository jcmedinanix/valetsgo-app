version: '3.8'
services:
  valetsgo-app:
    image: jcmedinanix/valetsgo-app:latest
    container_name: valetsgo-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000

  nginx:
    image: nginx:alpine
    container_name: valetsgo-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - valetsgo-app
      - dashboard

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: valetsgo-uptime
    restart: always
    ports:
      - "3001:3001"
    volumes:
      - uptime-kuma-data:/app/data

  dashboard:
    image: jcmedinanix/valetsgo-dashboard:latest
    container_name: valetsgo-dashboard
    restart: always
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - SESSION_SECRET=valetsgo2026secret
      - DASHBOARD_USER=admin
      - DASHBOARD_PASS=valetsgo2026
      - DOCKER_IMAGE=jcmedinanix/valetsgo-app
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - dashboard-data:/app/data
    depends_on:
      - valetsgo-app

volumes:
  uptime-kuma-data:
  dashboard-data:
