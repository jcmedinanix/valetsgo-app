<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ValetsGo — Dashboard DevOps</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="dashboard-page">

  <header class="topbar">
    <div class="topbar-brand">
      <span>⚙</span> ValetsGo DevOps
    </div>
    <div class="topbar-right">
      <span class="topbar-user" id="topbar-user"></span>
      <form action="/auth/logout" method="POST">
        <button type="submit" class="btn-secondary">Cerrar sesión</button>
      </form>
    </div>
  </header>

  <main class="main-content">

    <!-- CONTENEDORES -->
    <div class="card">
      <div class="card-header">
        <h2>Contenedores</h2>
        <button class="btn-secondary" onclick="loadContainers()">↻ Actualizar</button>
      </div>
      <div class="card-body">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Imagen</th>
                <th>Estado</th>
                <th>Acción</th>
              </tr>
            </thead>
            <tbody id="containers-tbody">
              <tr><td colspan="4" class="empty-msg"><span class="spinner"></span>Cargando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- LOGS -->
    <div class="card">
      <div class="card-header">
        <h2>Logs del contenedor</h2>
        <div style="display:flex;gap:0.75rem;align-items:center;">
          <select id="log-select" style="width:220px" onchange="loadLogs()">
            <option value="">Selecciona un contenedor</option>
          </select>
          <button class="btn-secondary" onclick="loadLogs()">↻ Actualizar</button>
        </div>
      </div>
      <div class="card-body">
        <div class="log-box" id="log-box">Selecciona un contenedor para ver sus logs...</div>
      </div>
    </div>

    <!-- ROLLBACK -->
    <div class="card">
      <div class="card-header">
        <h2>Rollback de versión</h2>
      </div>
      <div class="card-body">
        <div class="rollback-form">
          <div class="form-group">
            <label>Contenedor</label>
            <select id="rollback-container">
              <option value="">Selecciona contenedor</option>
            </select>
          </div>
          <div class="form-group">
            <label>Versión disponible en Docker Hub</label>
            <select id="rollback-tag">
              <option value="">Cargando versiones...</option>
            </select>
          </div>
          <button class="btn-danger" onclick="doRollback()">⚠ Ejecutar rollback</button>
        </div>
        <div id="rollback-msg" style="margin-top:1rem;font-size:0.9rem;"></div>
      </div>
    </div>

    <!-- HISTORIAL -->
    <div class="card">
      <div class="card-header">
        <h2>Historial de operaciones</h2>
        <button class="btn-secondary" onclick="loadHistory()">↻ Actualizar</button>
      </div>
      <div class="card-body">
        <ul class="history-list" id="history-list">
          <li class="empty-msg"><span class="spinner"></span>Cargando...</li>
        </ul>
      </div>
    </div>

  </main>

  <script src="/app.js"></script>
</body>
</html>
