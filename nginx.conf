server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://valetsgo-app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    location /health {
        proxy_pass http://valetsgo-app:3000/health;
    }

    location /dashboard {
        proxy_pass http://valetsgo-dashboard:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    location /auth {
        proxy_pass http://valetsgo-dashboard:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api {
        proxy_pass http://valetsgo-dashboard:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /style.css {
        proxy_pass http://valetsgo-dashboard:4000;
    }

    location /app.js {
        proxy_pass http://valetsgo-dashboard:4000;
    }

    location /login.html {
        proxy_pass http://valetsgo-dashboard:4000;
    }
}
